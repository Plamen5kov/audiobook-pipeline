services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - root_ollama:/root/.ollama
    environment:
      - OLLAMA_CONTEXT_LENGTH=16384
      - OLLAMA_KEEP_ALIVE=-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  text-analyzer:
    build: ./services/text-analyzer
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=qwen2.5:7b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  script-adapter:
    build: ./services/script-adapter
    ports:
      - "8002:8002"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=qwen2.5:7b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  xtts-v2:
    build: ./services/xtts-v2
    ports:
      - "8003:8003"
    volumes:
      - ./voices:/voices:ro
      - ./data/intermediate:/data/intermediate
      - ./voice-cast.yaml:/voice-cast.yaml:ro
      - xtts-models:/root/.local/share/tts
    environment:
      - COQUI_TOS_AGREED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  tts-router:
    build: ./services/tts-router
    ports:
      - "8010:8010"
    volumes:
      - ./voice-cast.yaml:/voice-cast.yaml:ro
    environment:
      - TTS_BACKENDS={"xtts-v2":"http://xtts-v2:8003","qwen3-tts":"http://qwen3-tts:8007"}
      - DEFAULT_ENGINE=xtts-v2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  qwen3-tts:
    build: ./services/qwen3-tts
    ports:
      - "8007:8007"
    volumes:
      - ./data/intermediate:/data/intermediate
      - ./voice-cast.yaml:/voice-cast.yaml:ro
      - qwen3-models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  audio-assembly:
    build: ./services/audio-assembly
    ports:
      - "8005:8005"
    volumes:
      - ./data/intermediate:/data/intermediate:ro
      - ./output:/output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  file-server:
    build: ./services/file-server
    ports:
      - "8080:8080"
    volumes:
      - ./voices:/voices
      - ./output:/output
      - ./data/intermediate:/data/intermediate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  root_ollama:
  xtts-models:
  qwen3-models:
