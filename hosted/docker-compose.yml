services:
  nginx:
    image: nginx:alpine
    ports:
      - "${PUBLIC_PORT:-4000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "3000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL-/}
    expose:
      - "80"
    restart: unless-stopped
